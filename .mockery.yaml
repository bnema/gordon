template: testify
formatter: goimports
force-file-write: true
dir: '{{.InterfaceDir}}/mocks'
filename: 'mock_{{.InterfaceName | snakecase}}.go'
structname: 'Mock{{.InterfaceName}}'
pkgname: 'mocks'

packages:
  github.com/bnema/gordon/internal/boundaries/out:
    interfaces:
      ContainerRuntime:
      BlobStorage:
      ManifestStorage:
      EventBus:
      EventPublisher:
      EventSubscriber:
      EventHandler:
      SecretProvider:
      EnvLoader:
      ContainerLogWriter:
      AttachmentConfigProvider:
      TokenStore:
      DomainSecretStore:
      RateLimiter:
      BackupStorage:
  github.com/bnema/gordon/internal/boundaries/in:
    interfaces:
      ContainerService:
      BackupService:
      RegistryService:
      ProxyService:
      ConfigService:
      AuthService:
      HealthService:
      HTTPProber:
      SecretService:
      LogService:
  # Exception: pushImageOps is a CLI-local interface, not a boundary port.
  # Mocked here because it abstracts Docker SDK calls that require a running
  # daemon, making unit/integration tests impractical without a test double.
  # Moving it to boundaries/out would violate interface segregation — no use
  # case depends on it.
  github.com/bnema/gordon/internal/adapters/in/cli:
    interfaces:
      pushImageOps:
